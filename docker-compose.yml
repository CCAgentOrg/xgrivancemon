version: '3.8'

services:
  xgrivancemon:
    build: .
    container_name: xgrivancemon
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: xgrivancemon-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
